# appspec.yml — AWS CodeDeploy instructions
# This file tells CodeDeploy how to deploy the application to EC2 instances.
version: 0.0
os: linux

files:
  - source: /
    destination: /opt/dost-ptri-app

hooks:
  BeforeInstall:
    - location: scripts/stop_server.sh
      timeout: 30

  AfterInstall:
    - location: scripts/install_dependencies.sh
      timeout: 60

  ApplicationStart:
    - location: scripts/start_server.sh
      timeout: 30

  ValidateService:
    - location: scripts/validate_service.sh
      timeout: 30
